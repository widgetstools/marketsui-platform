<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading...</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #1E1F23;
      color: #FFFFFF;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #383A40;
      border-top-color: #0A76D3;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px 0;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h1 { font-size: 18px; font-weight: 600; }
    p { font-size: 14px; color: #C9CBD2; }
  </style>
</head>
<body>
  <h1 id="title">Workspace Platform Starter</h1>
  <div class="spinner"></div>
  <p id="progress">Loading...</p>
  <script>
    async function init() {
      if (typeof fin !== 'undefined') {
        try {
          const options = await fin.me.getOptions();
          if (options.customData?.style) {
            const style = options.customData.style;
            if (style.title) document.getElementById('title').textContent = style.title;
            if (style.backgroundColor) document.body.style.backgroundColor = style.backgroundColor;
            if (style.textColor) document.body.style.color = style.textColor;
          }
          const channelName = `${fin.me.identity.uuid}-splash`;
          const channel = await fin.InterApplicationBus.Channel.connect(channelName);
          channel.register('progress', (payload) => {
            if (payload.status) {
              document.getElementById('progress').textContent = payload.status;
            }
          });
        } catch (err) {
          console.error('Splash init error:', err);
        }
      }
    }
    init();
  </script>
</body>
</html>
